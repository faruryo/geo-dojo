name: Deploy (production)

# main へのマージ/プッシュで本番 DB マイグレーション → Vercel 本番デプロイを自動実行する。
on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能

# 同時に複数の本番デプロイが走らないよう直列化（実行中はキャンセルせず待つ）
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate-and-deploy:
    name: Migrate prod DB & deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 1) 本番 DB マイグレーション（drizzle-kit migrate）
      #    DATABASE_URL は Supabase の直接接続/セッションプーラー（5432）を推奨。
      #    マイグレーションは冪等（IF NOT EXISTS 等）なので既存テーブルでも安全。
      - name: Run DB migrations
        run: pnpm drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 2) Vercel 本番デプロイ（現状の手動 CLI デプロイを自動化）
      - name: Deploy to Vercel (production)
        run: pnpm dlx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
